<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Test Gemini API Key (REST)</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:20px}
    textarea,input{width:100%;box-sizing:border-box;margin:6px 0;padding:8px;font-size:14px}
    button{padding:8px 12px;font-size:14px}
    pre{background:#111;color:#e6e6e6;padding:12px;border-radius:6px;overflow:auto;max-height:360px}
    .warn{background:#fff8e0;border-left:4px solid #f2c94c;padding:8px;margin-bottom:12px}
  </style>
</head>
<body>
  <h2>Gemini REST test (no npm)</h2>

  <div class="warn">
    <strong>Warning:</strong> This demo sends your API key from the browser. Only use for quick local tests. For production, proxy these requests from a server. See docs for best practices. 
  </div>

  <label>API Key (paste a test key)</label>
  <input id="apiKey" placeholder="YOUR_GEMINI_API_KEY_HERE" />

  <label>Model (example: <code>gemini-2.5-flash</code>)</label>
  <input id="model" value="gemini-2.5-flash" />

  <label>Prompt</label>
  <textarea id="prompt" rows="5">Explain how a transistor works in a few sentences.</textarea>

  <div style="display:flex;gap:8px;margin-top:8px">
    <button id="send">Send request</button>
    <button id="curl">Show equivalent curl</button>
  </div>

  <h3>Response</h3>
  <pre id="out">No request yet.</pre>

<script>
(async ()=>{

  const out = txt => { document.getElementById('out').textContent = txt; };

  function buildUrl(model, key) {
    // Using the public Generative Language endpoint with the model name and api key query param
    // Example: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=API_KEY
    const base = 'https://generativelanguage.googleapis.com/v1beta/models/';
    return `${base}${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(key)}`;
  }

  async function sendRequest() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const model = document.getElementById('model').value.trim();
    const prompt = document.getElementById('prompt').value;

    if (!apiKey) return out('Please paste your API key first.');

    const url = buildUrl(model, apiKey);

    // Request body format that examples/docs use: contents -> parts -> text
    const body = {
      contents: [
        { parts: [{ text: prompt }] }
      ],
      // optional settings you can tweak:
      // "temperature": 0.2,
      // "maxOutputTokens": 512
    };

    out('Sending request to:\n' + url + '\n\nRequest payload:\n' + JSON.stringify(body, null, 2) + '\n\nWaiting for response...');

    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
          // Note: API key is in query string; don't send Authorization header with the key here.
        },
        body: JSON.stringify(body)
      });

      const text = await res.text();

      // Try JSON pretty print if possible
      try {
        const j = JSON.parse(text);
        out('HTTP ' + res.status + ' ' + res.statusText + '\n\n' + JSON.stringify(j, null, 2));
      } catch (e) {
        out('HTTP ' + res.status + ' ' + res.statusText + '\n\n' + text);
      }
    } catch (err) {
      out('Network error or CORS problem:\n' + err.toString());
    }
  }

  document.getElementById('send').addEventListener('click', sendRequest);

  document.getElementById('curl').addEventListener('click', ()=>{
    const apiKey = document.getElementById('apiKey').value.trim() || 'YOUR_GEMINI_API_KEY';
    const model = document.getElementById('model').value.trim() || 'gemini-2.5-flash';
    const prompt = document.getElementById('prompt').value.replace(/\n/g,'\\n').replace(/"/g,'\\"');
    const url = buildUrl(model, apiKey);
    const curl = [
      'curl -X POST "' + url + '" \\',
      '  -H "Content-Type: application/json" \\',
      '  -d \'{ "contents": [ { "parts": [ { "text": "' + prompt + '" } ] } ] }\''
    ].join('\n');
    out(curl);
  });

})();
</script>
</body>
</html>
