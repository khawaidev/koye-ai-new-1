<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Your Signup - KOYE AI</title>
    <!--[if mso]>
    <style type="text/css">
        body, table, td, a { font-family: Arial, sans-serif !important; }
    </style>
    <![endif]-->
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5; font-family: 'Courier New', Courier, monospace;">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f5f5f5;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <!-- Terminal Window Container -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" style="max-width: 600px; background-color: #ffffff; border: 2px solid #000000; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">
                    <!-- Terminal Title Bar -->
                    <tr>
                        <td style="background-color: #ffffff; border-bottom: 2px solid #000000; padding: 12px 16px;">
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <td width="80" style="font-family: 'Courier New', Courier, monospace;">
                                        <span style="display: inline-block; width: 12px; height: 12px; border: 1px solid #000000; border-radius: 50%; margin-right: 6px; background-color: #ffffff;"></span>
                                        <span style="display: inline-block; width: 12px; height: 12px; border: 1px solid #000000; border-radius: 50%; margin-right: 6px; background-color: #ffffff;"></span>
                                        <span style="display: inline-block; width: 12px; height: 12px; border: 1px solid #000000; border-radius: 50%; background-color: #ffffff;"></span>
                                    </td>
                                    <td align="center" style="font-family: 'Courier New', Courier, monospace; font-size: 14px; font-weight: bold; color: #000000;">
                                        TERMINAL WRITER
                                    </td>
                                    <td width="80"></td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Content Area -->
                    <tr>
                        <td style="background-color: #ffffff; padding: 32px 24px; font-family: 'Courier New', Courier, monospace; color: #000000;">
                            <!-- Last Login Info -->
                            <p style="margin: 0 0 24px 0; font-size: 12px; color: #666666; line-height: 1.5;">
                                Last login: {{ .Date }}
                            </p>
                            
                            <!-- Main Heading -->
                            <h2 style="margin: 0 0 16px 0; font-size: 18px; font-weight: bold; color: #000000; font-family: 'Courier New', Courier, monospace;">
                                $ confirm_your_signup
                            </h2>
                            
                            <!-- Instructions -->
                            <p style="margin: 0 0 24px 0; font-size: 14px; color: #000000; line-height: 1.6; font-family: 'Courier New', Courier, monospace;">
                                Follow this link to confirm your user account:
                            </p>
                            
                            <!-- Confirmation Button/Link -->
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin: 0 0 32px 0;">
                                <tr>
                                    <td align="center" style="padding: 16px 0;">
                                        <a href="{{ .ConfirmationURL }}" style="display: inline-block; background-color: #000000; color: #ffffff; text-decoration: none; padding: 12px 32px; border: 2px solid #000000; font-family: 'Courier New', Courier, monospace; font-size: 14px; font-weight: bold; text-align: center;">
                                            $ confirm_email
                                        </a>
                                    </td>
                                </tr>
                            </table>
                            
                            <!-- Alternative Link (for email clients that don't support buttons) -->
                            <p style="margin: 0 0 24px 0; font-size: 12px; color: #666666; line-height: 1.6; font-family: 'Courier New', Courier, monospace; word-break: break-all;">
                                Or copy and paste this link into your browser:<br>
                                <span style="color: #000000;">{{ .ConfirmationURL }}</span>
                            </p>
                            
                            <!-- Divider -->
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <td style="border-top: 1px solid #cccccc; padding: 16px 0 0 0;">
                                        <p style="margin: 0; font-size: 12px; color: #666666; font-family: 'Courier New', Courier, monospace;">
                                            This link will expire in 24 hours.
                                        </p>
                                    </td>
                                </tr>
                            </table>
                            
                            <!-- Cursor Blink Effect (Visual) -->
                            <p style="margin: 24px 0 0 0; font-size: 12px; color: #000000; font-family: 'Courier New', Courier, monospace;">
                                <span style="display: inline-block; width: 8px; height: 16px; background-color: #000000; vertical-align: middle; margin-left: 4px;"></span>
                            </p>
                        </td>
                    </tr>
                </table>
                
                <!-- Footer -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" style="max-width: 600px; margin-top: 24px;">
                    <tr>
                        <td align="center" style="padding: 16px 0; font-family: 'Courier New', Courier, monospace; font-size: 11px; color: #666666;">
                            <p style="margin: 0 0 8px 0;">
                                KOYE<span style="font-weight: bold;">_</span>AI
                            </p>
                            <p style="margin: 0;">
                                $ AI-Powered Game Asset Creation
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
