<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>6-Petal Loading Animation</title>

<style>
    body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    svg {
        width: 220px;
        height: 220px;
    }

    @keyframes sway-left {
        0%,100% { transform: rotate(0deg); }
        50%     { transform: rotate(-8deg); }
    }

    @keyframes sway-right {
        0%,100% { transform: rotate(0deg); }
        50%     { transform: rotate(8deg); }
    }

    /* Apply animations */
    .sway-left {
        transform-origin: 100px 100px;
        animation: sway-left 2.2s ease-in-out infinite;
    }

    .sway-right {
        transform-origin: 100px 100px;
        animation: sway-right 2.2s ease-in-out infinite;
    }
</style>

</head>
<body>

<svg viewBox="0 0 200 200" fill="white">

    <!-- Center dot -->
    <circle cx="100" cy="100" r="8" />

    <!-- PETAL SHAPE (used by groups via rotation) -->
    <defs>
        <path id="petal" d="M100 100 
             C 100 55, 85 35, 100 15
             C 115 35, 100 55, 100 100 Z" />
    </defs>

    <!-- GROUP 1 (0° base) -->
    <g transform="rotate(0 100 100)">
        <use href="#petal" class="sway-right" transform="rotate(-7.5 100 100)" />
        <use href="#petal" class="sway-left"  transform="rotate(7.5 100 100)" />
    </g>

    <!-- GROUP 2 (35°) -->
    <g transform="rotate(50 100 100)">
        <use href="#petal" class="sway-left"  transform="rotate(-7.5 100 100)" />
        <use href="#petal" class="sway-right" transform="rotate(7.5 100 100)" />
    </g>

    <!-- GROUP 3 (70°) -->
    <g transform="rotate(100 100 100)">
        <use href="#petal" class="sway-right" transform="rotate(-7.5 100 100)" />
        <use href="#petal" class="sway-left"  transform="rotate(7.5 100 100)" />
    </g>

</svg>

</body>
</html>
